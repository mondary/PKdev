id = "devpi.kanban"
name = "Kanban"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Kanban board pour agent management — 1 conductor par projet, worktrees par ticket"
platforms = ["linux", "macos"]

[[build]]
command = ["cargo", "build", "--release"]

[[panes]]
id = "board"
title = "Kanban"
placement = "overlay"
command = ["./target/release/kanban"]

[[actions]]
id = "toggle"
title = "Toggle Kanban"
contexts = ["workspace"]
command = ["./target/release/kanban"]
